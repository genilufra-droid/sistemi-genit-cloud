name: Test Phase 4.3 export operator UI

on:
  push:
    branches: [phase4-export-shipments-logistics]
    paths:
      - 'apps/web/phase4-export-logistics-ui.*'
      - 'apps/web/package.json'
      - 'scripts/patch-phase4-export-logistics-ui.cjs'
      - 'tests/phase43-export-ui-smoke.cjs'
      - '.github/workflows/test-phase43-export-ui.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Validate and build Phase 4.3 UI
        run: |
          node --check apps/web/phase4-export-logistics-ui.js
          node --check scripts/patch-phase4-export-logistics-ui.cjs
          node --check tests/phase43-export-ui-smoke.cjs
          cd apps/web
          npm ci --workspaces=false
          VITE_API_URL=http://127.0.0.1:3100 GENIT_CLOUD_REQUIRED=true npm run build
          grep -q 'SG_PHASE43_EXPORT_LOGISTICS_UI_START' dist/index.html
          grep -q 'Ngarkesat / Eksporti' dist/index.html
          grep -q 'Kartela e Automjeteve' dist/index.html
          grep -q 'Packing List' dist/index.html
          grep -q 'CMR' dist/index.html
          grep -q 'POD:' dist/index.html
      - name: Install browser runtime
        run: |
          mkdir -p /tmp/sg-phase43-ui
          cd /tmp/sg-phase43-ui
          npm init -y >/dev/null
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Verify export operator workflow
        id: ui_test
        continue-on-error: true
        run: |
          mkdir -p /tmp/sg-phase43-ui-report
          cd apps/web
          npm run start > /tmp/sg-phase43-web.log 2>&1 &
          server_pid=$!
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4173 >/dev/null && break
            sleep 1
          done
          cd ../..
          set +e
          NODE_PATH=/tmp/sg-phase43-ui/node_modules TEST_URL=http://127.0.0.1:4173 node tests/phase43-export-ui-smoke.cjs > /tmp/sg-phase43-ui-report/browser.txt 2>&1
          status=$?
          echo '' >> /tmp/sg-phase43-ui-report/browser.txt
          echo '--- WEB SERVER LOG ---' >> /tmp/sg-phase43-ui-report/browser.txt
          cat /tmp/sg-phase43-web.log >> /tmp/sg-phase43-ui-report/browser.txt 2>&1 || true
          kill $server_pid || true
          cat /tmp/sg-phase43-ui-report/browser.txt
          exit $status
      - name: Upload Phase 4.3 UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase43-export-ui-report
          path: /tmp/sg-phase43-ui-report/browser.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce Phase 4.3 UI result
        if: steps.ui_test.outcome != 'success'
        run: exit 1
