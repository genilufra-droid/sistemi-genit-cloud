name: Test Phase 6.2 traceability dossier and audit

on:
  push:
    branches: [phase62-traceability-dossier, fix-phase62-cors-fetch, fix-trace-registry-optional-origin-weight58]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'scripts/test-phase62-scenario.mjs'
      - '.github/workflows/test-phase62-traceability-audit.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  phase62:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genit_phase62_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d genit_phase62_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/genit_phase62_test
      JWT_SECRET: phase62-audit-test-secret-minimum-32-characters
      NODE_ENV: test
      CORS_ORIGIN: http://127.0.0.1:4173
      PORT: 3000
      VITE_API_URL: http://127.0.0.1:3000
      GENIT_CLOUD_REQUIRED: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Check API and scenario syntax
        run: |
          cd apps/api
          npm ci --workspaces=false
          npm run check
          cd ../..
          node --check scripts/test-phase62-scenario.mjs
          node --check apps/web/phase63-traceability-ui-hotfix.js
          node --check apps/web/build-scripts/patch-phase63-traceability-ui-hotfix.cjs

      - name: Start API
        run: |
          cd apps/api
          npm start > /tmp/phase62-api.log 2>&1 &
          echo $! > /tmp/phase62-api.pid
          for attempt in $(seq 1 90); do
            curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/phase62-api.log
          exit 1

      - name: Verify browser CORS preflight with device audit headers
        run: |
          curl --silent --show-error --dump-header /tmp/phase62-cors-options.headers --output /dev/null \
            --request OPTIONS http://127.0.0.1:3000/api/trace/workflow/weights/00000000-0000-4000-8000-000000000000/lines \
            --header 'Origin: http://127.0.0.1:4173' \
            --header 'Access-Control-Request-Method: PUT' \
            --header 'Access-Control-Request-Headers: authorization,content-type,x-sg-device-id,x-sg-device-name,x-sg-device-platform,x-sg-device-timezone,x-sg-client-time,x-sg-device-serial'
          tr -d '\r' < /tmp/phase62-cors-options.headers | tee /tmp/phase62-cors-options.normalized
          grep -qi '^HTTP/.* 204' /tmp/phase62-cors-options.normalized
          grep -qi '^Access-Control-Allow-Origin: http://127.0.0.1:4173$' /tmp/phase62-cors-options.normalized
          grep -qi '^Access-Control-Allow-Methods: .*PUT' /tmp/phase62-cors-options.normalized
          for header in x-sg-device-id x-sg-device-name x-sg-device-platform x-sg-device-timezone x-sg-client-time x-sg-device-serial; do
            grep -i '^Access-Control-Allow-Headers:' /tmp/phase62-cors-options.normalized | grep -qi "$header"
          done
          curl --silent --show-error --fail --dump-header /tmp/phase62-cors-get.headers \
            http://127.0.0.1:3000/api/health \
            --header 'Origin: http://127.0.0.1:4173' \
            --header 'X-SG-Device-ID: test-device' \
            --output /tmp/phase62-health.json
          tr -d '\r' < /tmp/phase62-cors-get.headers | grep -qi '^Access-Control-Allow-Origin: http://127.0.0.1:4173$'
          grep -q '"status":"ok"' /tmp/phase62-health.json

      - name: Run dossier, registry, optional-origin, 58mm and audit scenario
        id: scenario
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/test-phase62-scenario.mjs 2>&1 | tee /tmp/phase62-scenario.log

      - name: Upload Phase 6.2 debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase62-debug-${{ github.run_id }}
          path: |
            /tmp/phase62-api.log
            /tmp/phase62-scenario.log
            /tmp/phase62-cors-options.headers
            /tmp/phase62-cors-get.headers
            /tmp/phase62-health.json
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when scenario failed
        if: ${{ steps.scenario.outcome == 'failure' }}
        run: |
          cat /tmp/phase62-scenario.log || true
          exit 1

      - name: Verify audit history is immutable
        run: |
          set +e
          OUTPUT=$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "UPDATE system_action_events SET action='TAMPERED' WHERE sequence_no=(SELECT MIN(sequence_no) FROM system_action_events);" 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            echo 'Audit history update was not blocked.'
            exit 1
          fi
          echo "$OUTPUT" | grep -q 'System action events are immutable'

      - name: Build web with optional origin and 58mm weight preview
        run: |
          cd apps/web
          npm ci --workspaces=false
          npm run build
          grep -q 'SG_PHASE62_TRACEABILITY_WORKFLOW_UI_START' dist/index.html
          grep -q 'SG_PHASE63_TRACEABILITY_UI_HOTFIX_START' dist/index.html
          grep -q 'Ferma, Bima dhe Parcela plotësohen vetëm' dist/index.html
          grep -q 'Ferma u ruajt dhe u shfaq në regjistër' dist/index.html
          grep -q 'KOPJE FORMULARI' dist/index.html
          grep -q 'size:58mm auto' dist/index.html
          grep -q 'PESHË NETO' dist/index.html
          grep -q 'SG_PHASE62_LOT_LABEL_58MM_UI_START' dist/index.html
          grep -q 'SG_PHASE62_AUDIT_DEVICE_UI_START' dist/index.html
          grep -q 'X-SG-Device-ID' dist/index.html
          grep -q '/api/audit/client-event' dist/index.html

      - name: Show API log on failure
        if: failure()
        run: cat /tmp/phase62-api.log || true
