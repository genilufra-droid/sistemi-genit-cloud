name: Test Railway root dispatch

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'scripts/railway-*.cjs'
      - 'apps/web/**'
      - '.github/workflows/test-railway-root-dispatch.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  root-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install monorepo
        run: npm ci
      - name: Validate dispatchers
        run: |
          node --check scripts/railway-build.cjs
          node --check scripts/railway-start.cjs
      - name: Build web from repository root
        env:
          RAILWAY_SERVICE_NAME: genit-web
          VITE_API_URL: https://genit-api-production.up.railway.app
          GENIT_CLOUD_REQUIRED: 'true'
        run: npm run build
      - name: Start web from repository root
        env:
          RAILWAY_SERVICE_NAME: genit-web
          HOST: 127.0.0.1
          PORT: 4173
        run: |
          npm start > /tmp/root-web.log 2>&1 &
          echo $! > /tmp/root-web.pid
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4173/healthz >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/root-web.log
          exit 1
      - name: Verify Phase 6 response
        run: |
          curl --fail --silent http://127.0.0.1:4173/ > /tmp/root-index.html
          grep -q 'SG_PHASE6_OPERATIONS_UI_START' /tmp/root-index.html
          grep -q 'Paneli Operacional' /tmp/root-index.html
      - name: Validate API root build dispatch
        env:
          RAILWAY_SERVICE_NAME: genit-api
        run: npm run build
      - name: Stop runtime
        if: always()
        run: |
          cat /tmp/root-web.log || true
          test -f /tmp/root-web.pid && kill $(cat /tmp/root-web.pid) || true
