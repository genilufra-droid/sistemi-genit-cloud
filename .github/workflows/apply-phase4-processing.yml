name: Apply Phase 4.2 server integration

on:
  push:
    branches: [phase4-processing-packaging]
    paths:
      - 'scripts/patch-phase4-processing-server.py'
      - '.github/workflows/apply-phase4-processing.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-processing-packaging
          fetch-depth: 0
      - name: Apply idempotent integration
        run: |
          python3 scripts/patch-phase4-processing-server.py
          node --check apps/api/src/server.js
          node --check apps/api/src/phase4-processing-packaging.js
          cd apps/api
          npm ci --workspaces=false
          npm run check
      - name: Commit verified integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/server.js apps/api/package.json
          if git diff --cached --quiet; then
            echo 'No integration changes required.'
          else
            git commit -m 'Integrate Phase 4.2 processing and packaging routes'
            git push origin HEAD:phase4-processing-packaging
          fi
