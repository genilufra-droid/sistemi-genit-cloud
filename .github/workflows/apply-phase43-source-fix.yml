name: Apply Phase 4.3 source correction

on:
  push:
    branches: [phase4-export-shipments-logistics]
    paths:
      - 'scripts/patch-phase43-export-source.cjs'
      - '.github/workflows/apply-phase43-source-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-export-shipments-logistics
          fetch-depth: 0
      - name: Apply and validate source correction
        run: |
          node scripts/patch-phase43-export-source.cjs
          node --check apps/api/src/phase4-export-logistics.js
      - name: Commit corrected source
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/phase4-export-logistics.js
          git commit -m 'Fix Phase 4.3 shipment insert parameters'
          git push origin HEAD:phase4-export-shipments-logistics
