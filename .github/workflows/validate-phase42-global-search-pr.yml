name: Validate Phase 4.2 global search-create PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/global-create-cta.*'
      - 'apps/web/package.json'
      - 'scripts/patch-global-create-cta.cjs'
      - 'tests/global-create-cta-smoke.mjs'
      - '.github/workflows/validate-phase42-global-search-pr.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-and-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate integrated API source
        run: |
          cd apps/api
          npm ci --workspaces=false
          npm run check
      - name: Validate and build global UI
        run: |
          node --check apps/web/global-create-cta.js
          node --check scripts/patch-global-create-cta.cjs
          cd apps/web
          npm ci --workspaces=false
          npm run build
          grep -q 'SG_GLOBAL_CREATE_CTA_START' dist/index.html
          grep -q 'beginQuickCreate' dist/index.html
          grep -q 'completeQuickCreate' dist/index.html
          grep -q '+ Shto Furnitor / Fermer' dist/index.html
          grep -q '+ Shto Artikull' dist/index.html
      - name: Test search-create source preservation and permissions
        run: |
          npm install --no-save --ignore-scripts jsdom@26
          node tests/global-create-cta-smoke.mjs
