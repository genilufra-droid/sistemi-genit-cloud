name: Test global search-create PostgreSQL

on:
  push:
    branches: [main, phase42-global-create-latest-main]
    paths:
      - 'apps/api/**'
      - 'apps/web/global-create-cta.*'
      - 'scripts/patch-global-create-cta.cjs'
      - 'tests/global-create-cta-smoke.mjs'
      - 'tests/global-quick-create-dom.mjs'
      - 'tests/phase42-global-master-flow.mjs'
      - '.github/workflows/test-global-search-create-postgres.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-ui-flow:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genit_global_create_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genit_global_create_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/genit_global_create_test
      JWT_SECRET: phase42-global-search-postgresql-test-secret-minimum-32
      NODE_ENV: test
      CORS_ORIGIN: http://127.0.0.1:4173
      PORT: 3000
      TEST_API_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate API source and Phase 5 launcher
        run: |
          cd apps/api
          npm ci --workspaces=false
          npm run check
          node --check src/phase5-launcher.js
      - name: Build complete web
        run: |
          cd apps/web
          npm ci --workspaces=false
          VITE_API_URL=http://127.0.0.1:3000 GENIT_CLOUD_REQUIRED=true npm run build
          grep -q 'SG_PHASE5_FINANCE_UI_START' dist/index.html
          grep -q 'SG_GLOBAL_CREATE_CTA_START' dist/index.html
          grep -q '/api/finance/accounts' dist/index.html
          grep -q 'Nuk u gjet asnjë rezultat' dist/index.html
      - name: Test live DOM preservation
        run: |
          npm install --no-save --ignore-scripts jsdom@26
          node tests/global-create-cta-smoke.mjs
          node tests/global-quick-create-dom.mjs
      - name: Start API through Phase 5 launcher
        run: |
          cd apps/api
          npm start > /tmp/genit-global-api.log 2>&1 &
          echo $! > /tmp/genit-global-api.pid
          for attempt in $(seq 1 60); do
            curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/genit-global-api.log
          exit 1
      - name: Test masters, permissions, finance and RAW to PKG
        run: node tests/phase42-global-master-flow.mjs
      - name: Show API log
        if: always()
        run: cat /tmp/genit-global-api.log || true
      - name: Stop API
        if: always()
        run: test -f /tmp/genit-global-api.pid && kill $(cat /tmp/genit-global-api.pid) || true
