name: Test web runtime

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'scripts/patch-*.cjs'
      - '.github/workflows/test-web-runtime.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --workspaces=false
      - name: Validate server and Phase 6 syntax
        run: |
          node --check apps/web/serve.cjs
          node --check apps/web/build-self-contained.cjs
          node --check apps/web/phase6-operations-ui.js
          node --check apps/web/phase61-professional-ui.js
          node --check scripts/patch-phase6-operations-ui.cjs
          node --check apps/web/build-scripts/patch-phase61-professional-ui.cjs
      - name: Build web
        working-directory: apps/web
        env:
          VITE_API_URL: https://genit-api-production.up.railway.app
          GENIT_CLOUD_REQUIRED: 'true'
        run: npm run build
      - name: Build from isolated Railway source root
        env:
          VITE_API_URL: https://genit-api-production.up.railway.app
          GENIT_CLOUD_REQUIRED: 'true'
        run: |
          rm -rf /tmp/genit-web-isolated
          mkdir -p /tmp/genit-web-isolated
          cp -a apps/web/. /tmp/genit-web-isolated/
          rm -rf /tmp/genit-web-isolated/node_modules /tmp/genit-web-isolated/dist
          cd /tmp/genit-web-isolated
          npm ci --workspaces=false
          npm run build
          test -s dist/index.html
          grep -q 'SG_PHASE5_FINANCE_UI_START' dist/index.html
          grep -q 'SG_PHASE6_OPERATIONS_UI_START' dist/index.html
          grep -q 'SG_PHASE61_PROFESSIONAL_UI_START' dist/index.html
          grep -q 'SG_PHASE43_EXPORT_EXTENSIONS_UI_START' dist/index.html
      - name: Start production runtime
        working-directory: apps/web
        env:
          HOST: 127.0.0.1
          PORT: 4173
        run: |
          npm start > /tmp/genit-web.log 2>&1 &
          echo $! > /tmp/genit-web.pid
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4173/healthz >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/genit-web.log
          exit 1
      - name: Verify local root and module markers
        run: |
          curl --fail --silent http://127.0.0.1:4173/ > /tmp/index.html
          grep -q 'SG_PHASE5_FINANCE_UI_START' /tmp/index.html
          grep -q 'SG_PHASE6_OPERATIONS_UI_START' /tmp/index.html
          grep -q 'SG_PHASE61_PROFESSIONAL_UI_START' /tmp/index.html
          grep -q 'SG_PHASE43_EXPORT_EXTENSIONS_UI_START' /tmp/index.html
          grep -q 'Paneli Operacional' /tmp/index.html
          grep -q 'Pamje &amp; Eksport' /tmp/index.html
          grep -q 'FORMULAR PESHE' /tmp/index.html
      - name: Stop local runtime
        run: test -f /tmp/genit-web.pid && kill $(cat /tmp/genit-web.pid) || true
      - name: Build Railway Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://genit-api-production.up.railway.app \
            --build-arg GENIT_CLOUD_REQUIRED=true \
            --build-arg GITHUB_SHA=${GITHUB_SHA} \
            -t sistemi-genit-web:test \
            apps/web
      - name: Start Docker runtime
        run: |
          docker run -d --name sistemi-genit-web-test -e PORT=4173 -p 4174:4173 sistemi-genit-web:test
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4174/healthz >/dev/null && exit 0
            sleep 1
          done
          docker logs sistemi-genit-web-test
          exit 1
      - name: Verify Docker root and markers
        run: |
          curl --fail --silent http://127.0.0.1:4174/ > /tmp/docker-index.html
          grep -q 'SG_PHASE5_FINANCE_UI_START' /tmp/docker-index.html
          grep -q 'SG_PHASE6_OPERATIONS_UI_START' /tmp/docker-index.html
          grep -q 'SG_PHASE61_PROFESSIONAL_UI_START' /tmp/docker-index.html
          grep -q 'SG_PHASE43_EXPORT_EXTENSIONS_UI_START' /tmp/docker-index.html
      - name: Show logs and stop runtimes
        if: always()
        run: |
          cat /tmp/genit-web.log || true
          test -f /tmp/genit-web.pid && kill $(cat /tmp/genit-web.pid) || true
          docker logs sistemi-genit-web-test || true
          docker rm -f sistemi-genit-web-test || true
