name: Diagnose Phase 3 Cloud web build

on:
  push:
    branches: [cloud-erp-phase3-online-core]
    paths:
      - '.github/workflows/diagnose-cloud-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cloud-erp-phase3-online-core
          fetch-depth: 0
      - name: Install and capture build
        id: build
        continue-on-error: true
        run: |
          mkdir -p docs
          set +e
          (
            set -euxo pipefail
            cd apps/web
            npm ci --workspaces=false
            VITE_API_URL=http://127.0.0.1:3100 GENIT_CLOUD_REQUIRED=true npm run build
            cmp index.html dist/index.html
            grep -n 'SG_CLOUD_ERP_ADAPTER_START' dist/index.html | head
            grep -n 'cloud-first-admin-form' dist/index.html | head
            grep -n 'http://127.0.0.1:3100' dist/index.html | head
            grep -n 'SG_ODOO_TRACEABILITY_ACTIONS_START' dist/index.html | head
          ) > docs/phase3-cloud-build-report.txt 2>&1
          status=$?
          cat docs/phase3-cloud-build-report.txt
          exit $status
      - name: Commit report and remove diagnostic workflow
        if: always()
        run: |
          rm -f .github/workflows/diagnose-cloud-build.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/phase3-cloud-build-report.txt .github/workflows/diagnose-cloud-build.yml
          git commit -m 'Record Phase 3 Cloud web build diagnostic' || exit 0
          git push origin HEAD:cloud-erp-phase3-online-core
