name: Rebase export extensions on finance main

on:
  push:
    branches: [phase4-export-final-verified]
    paths:
      - '.github/workflows/rebase-export-on-finance-main.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-export-final-verified
          fetch-depth: 0
      - name: Merge current main without losing export or finance
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e
          conflicts=$(git diff --name-only --diff-filter=U || true)
          for file in $conflicts; do
            case "$file" in
              apps/api/package.json|apps/web/package.json)
                git checkout --theirs -- "$file"
                git add "$file"
                ;;
              *)
                echo "Konflikt i papritur: $file"
                git merge --abort || true
                exit 1
                ;;
            esac
          done
          python3 - <<'PY'
          import json
          from pathlib import Path

          api=Path('apps/api/package.json')
          data=json.loads(api.read_text(encoding='utf-8'))
          token='node --check src/phase4-export-extensions.js'
          if token not in data['scripts']['check']:
              data['scripts']['check'] += ' && ' + token
          api.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          web=Path('apps/web/package.json')
          data=json.loads(web.read_text(encoding='utf-8'))
          cmd=data['scripts']['build']
          token='node ../../scripts/patch-phase4-export-extensions-ui.cjs'
          if token not in cmd:
              anchor='node ../../scripts/patch-phase4-export-logistics-ui.cjs'
              if anchor not in cmd:
                  raise SystemExit('Mungon anchor-i i UI-së së eksportit')
              cmd=cmd.replace(anchor,anchor+' && '+token,1)
          data['scripts']['build']=cmd
          web.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          git add apps/api/package.json apps/web/package.json
          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            git commit -m 'Merge finance main into export extensions'
          elif ! git diff --cached --quiet; then
            git commit -m 'Align export extensions with finance main'
          else
            echo 'Branch already contains current main.'
          fi
      - name: Validate combined API and web build
        run: |
          python3 scripts/patch-phase4-export-extensions.py
          cd apps/api
          npm ci --workspaces=false
          npm run check
          cd ../web
          npm ci --workspaces=false
          npm run build
          grep -q 'SG_PHASE5_FINANCE_UI_START' dist/index.html
          grep -q 'SG_PHASE43_EXPORT_EXTENSIONS_UI_START' dist/index.html
          grep -q 'Commercial Invoice janë të detyrueshme' dist/index.html
      - name: Push merged branch
        run: |
          git status --short
          git push origin HEAD:phase4-export-final-verified
