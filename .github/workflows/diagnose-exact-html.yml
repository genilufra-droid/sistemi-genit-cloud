name: Diagnose exact HTML package

on:
  push:
    branches: [exact-html-online]
    paths:
      - '.github/workflows/diagnose-exact-html.yml'

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-html-online
          fetch-depth: 0

      - name: Diagnose and save result
        shell: bash
        run: |
          set +e
          mkdir -p docs
          report=docs/exact-html-diagnostic.txt
          : > "$report"
          echo "source_branch=origin/html-6-4-online" >> "$report"
          rm -rf /tmp/html64-source-tree
          git worktree add --detach /tmp/html64-source-tree origin/html-6-4-online >> "$report" 2>&1
          echo "worktree_status=$?" >> "$report"
          for i in 00 01 02 03 04 05 06 07; do
            file="/tmp/html64-source-tree/html64-source/xz-$i.b64"
            if [ -f "$file" ]; then
              echo "part_$i.bytes=$(wc -c < "$file")" >> "$report"
              echo "part_$i.sha256=$(sha256sum "$file" | cut -d' ' -f1)" >> "$report"
            else
              echo "part_$i=MISSING" >> "$report"
            fi
          done
          cat /tmp/html64-source-tree/html64-source/xz-*.b64 | tr -d '\r\n\t ' > /tmp/combined.b64 2>> "$report"
          echo "combined_base64_bytes=$(wc -c < /tmp/combined.b64 2>/dev/null)" >> "$report"
          base64 --decode /tmp/combined.b64 > /tmp/package.xz 2>> "$report"
          echo "base64_status=$?" >> "$report"
          echo "xz_bytes=$(wc -c < /tmp/package.xz 2>/dev/null)" >> "$report"
          xz --test /tmp/package.xz 2>> "$report"
          echo "xz_test_status=$?" >> "$report"
          xz --decompress --stdout /tmp/package.xz > /tmp/restored.html 2>> "$report"
          echo "xz_decompress_status=$?" >> "$report"
          echo "html_bytes=$(wc -c < /tmp/restored.html 2>/dev/null)" >> "$report"
          echo "html_sha256=$(sha256sum /tmp/restored.html 2>/dev/null | cut -d' ' -f1)" >> "$report"
          grep -qi '<!doctype html' /tmp/restored.html 2>/dev/null
          echo "doctype_status=$?" >> "$report"
          cat "$report"

      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/exact-html-diagnostic.txt
          git commit -m 'Record exact HTML package diagnostics'
          git push origin exact-html-online
