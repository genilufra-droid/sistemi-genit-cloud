name: Apply Phase 4 export extensions

on:
  push:
    branches: [phase4-export-shipments]
    paths:
      - 'scripts/patch-phase4-export-extensions.py'
      - 'apps/api/src/phase4-export-extensions.js'
      - '.github/workflows/apply-phase4-export-extensions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-export-shipments
          fetch-depth: 0
      - name: Apply and validate integration
        run: |
          python3 scripts/patch-phase4-export-extensions.py
          cd apps/api
          npm ci --workspaces=false
          npm run check
      - name: Commit verified integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/server.js apps/api/src/phase4-export-logistics.js apps/api/package.json
          if git diff --cached --quiet; then
            echo 'No integration changes required.'
          else
            git commit -m 'Integrate export documents reports and dispatch preflight'
            git push origin HEAD:phase4-export-shipments
          fi
