name: Bootstrap Phase 2

on:
  push:
    branches: [main]
    paths: ['.github/workflows/bootstrap-phase2.yml']

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-2-core
          fetch-depth: 0
      - run: node scripts/apply-phase2.mjs
      - name: Validate API
        run: |
          node --check apps/api/src/server.js
          node --check apps/api/src/phase2.js
          node --check apps/api/src/phase2-documents.js
          node --check apps/api/src/run-phase2-migration.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/server.js apps/api/src/run-phase2-migration.js apps/web/src/App.jsx
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Integrate Phase 2 API and web navigation"
          git push origin phase-2-core
