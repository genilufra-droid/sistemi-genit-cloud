name: Build and test Odoo traceability

on:
  push:
    branches: [odoo-traceability-actions]
    paths:
      - 'apps/web/odoo-traceability-actions.js'
      - 'apps/web/odoo-traceability-actions.css'
      - 'scripts/patch-odoo-traceability.cjs'
      - 'tests/traceability-odoo-smoke.cjs'
      - '.github/workflows/build-odoo-traceability.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: odoo-traceability-actions
          fetch-depth: 0

      - name: Validate source syntax and service binding
        run: |
          node --check apps/web/odoo-traceability-actions.js
          node --check scripts/patch-odoo-traceability.cjs
          node --check tests/traceability-odoo-smoke.cjs
          grep -q 'S.saveSalesInvoice' apps/web/odoo-traceability-actions.js
          grep -q 'S.registerSale' apps/web/odoo-traceability-actions.js
          grep -q '200 kg' tests/traceability-odoo-smoke.cjs
          grep -q '150 kg' tests/traceability-odoo-smoke.cjs

      - name: Patch exact HTML idempotently
        run: |
          node scripts/patch-odoo-traceability.cjs
          first=$(sha256sum apps/web/index.html | cut -d' ' -f1)
          node scripts/patch-odoo-traceability.cjs
          second=$(sha256sum apps/web/index.html | cut -d' ' -f1)
          test "$first" = "$second"
          grep -q 'SG_ODOO_TRACEABILITY_ACTIONS_START' apps/web/index.html
          grep -q 'sg-demo-trace-btn' apps/web/index.html
          grep -q 'sg-new-work-order-btn' apps/web/index.html

      - name: Build static web
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          cmp index.html dist/index.html

      - name: Install browser runtime
        run: |
          mkdir -p /tmp/sg-odoo-test
          cd /tmp/sg-odoo-test
          npm init -y >/dev/null
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Run Gjethe Ferre 200 to 50 kg test
        run: |
          cd apps/web
          npm run start > /tmp/sg-web.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid || true; cat /tmp/sg-web.log || true' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4173 >/dev/null && break
            sleep 1
          done
          cd ../..
          NODE_PATH=/tmp/sg-odoo-test/node_modules TEST_URL=http://127.0.0.1:4173 node tests/traceability-odoo-smoke.cjs

      - name: Commit tested generated HTML
        if: github.event_name == 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/index.html
          if git diff --cached --quiet; then
            echo 'Generated HTML already committed.'
            exit 0
          fi
          git commit -m 'Activate tested Odoo traceability actions'
          git push origin odoo-traceability-actions
