name: Rebase final ERP branch on latest main

on:
  push:
    branches: [phase4-export-final-verified]
    paths:
      - '.github/workflows/rebase-global-validation-main.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-export-final-verified
          fetch-depth: 0
      - name: Merge latest main and preserve permanent validation
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge --no-ff --no-commit origin/main
          set -e
          conflicts=$(git diff --name-only --diff-filter=U || true)
          for file in $conflicts; do
            case "$file" in
              .github/workflows/validate-phase42-global-search-pr.yml)
                git checkout --ours -- "$file"
                git add "$file"
                ;;
              *)
                echo "Konflikt i papritur: $file"
                git merge --abort || true
                exit 1
                ;;
            esac
          done
          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            git commit -m 'Merge latest main and retain permanent global create validation'
          fi
      - name: Validate combined source
        run: |
          cd apps/api
          npm ci --workspaces=false
          npm run check
          cd ../..
          node --check apps/web/global-create-cta.js
          node --check tests/global-create-cta-smoke.mjs
          npm install --no-save --ignore-scripts jsdom@26
          node tests/global-create-cta-smoke.mjs
      - name: Push merged branch
        run: git push origin HEAD:phase4-export-final-verified
