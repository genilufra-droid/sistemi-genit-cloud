name: Apply Phase 4.3 server integration

on:
  push:
    branches: [phase4-export-shipments-logistics]
    paths:
      - 'apps/api/src/phase4-export-logistics.js'
      - 'scripts/apply-phase43-server.cjs'
      - '.github/workflows/apply-phase43-server.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-export-shipments-logistics
          fetch-depth: 0
      - name: Apply and validate integration
        run: |
          node scripts/apply-phase43-server.cjs
          node --check apps/api/src/phase4-export-logistics.js
          node --check apps/api/src/server.js
      - name: Commit integration
        run: |
          if git diff --quiet; then
            echo 'Server already integrated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/server.js
          git commit -m 'Integrate Phase 4.3 export and logistics routes'
          git push origin HEAD:phase4-export-shipments-logistics
