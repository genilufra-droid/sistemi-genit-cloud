name: Apply global master-data integration on Phase 5

on:
  push:
    branches: [phase42-global-search-create-phase5]
    paths:
      - 'apps/api/src/global-master-data.js'
      - 'scripts/patch-global-master-data-server.py'
      - '.github/workflows/apply-global-master-data-phase5.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase42-global-search-create-phase5
          fetch-depth: 0
      - name: Apply idempotent integration
        run: |
          python3 scripts/patch-global-master-data-server.py
          node --check apps/api/src/server.js
          node --check apps/api/src/global-master-data.js
          node --check apps/api/src/phase5-launcher.js
      - name: Commit verified server integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/server.js
          if git diff --cached --quiet; then
            echo 'Server integration already applied.'
          else
            git commit -m 'Integrate global master-data routes before Phase 5 launcher'
            git push origin HEAD:phase42-global-search-create-phase5
          fi
