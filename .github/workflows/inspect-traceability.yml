name: Inspect traceability source

on:
  push:
    branches: [odoo-traceability-actions]
    paths:
      - '.github/workflows/inspect-traceability.yml'

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: odoo-traceability-actions
      - name: Extract sales service API
        run: |
          node <<'NODE'
          const fs=require('fs');
          const lines=fs.readFileSync('apps/web/index.html','utf8').split(/\r?\n/);
          const terms=['saveSale','registerSale','postSale','saveSales','registerSales','commitSale','saveSaleInvoice','postSaleInvoice','saveInvoice','registerInvoice','Services =','global.Services','salePosting','SALE_OUT'];
          const out=[];
          for(const term of terms){
            out.push(`\n===== ${term} =====`);
            let n=0;
            for(let i=0;i<lines.length;i++){
              if(!lines[i].includes(term)) continue;
              n++;
              out.push(`--- ${n} @ ${i+1} ---`);
              for(let j=Math.max(0,i-22);j<Math.min(lines.length,i+65);j++) out.push(`${j+1}: ${lines[j]}`);
              if(n>=12) break;
            }
            if(!n) out.push('NO MATCH');
          }
          fs.mkdirSync('docs',{recursive:true});
          fs.writeFileSync('docs/sales-service-api.txt',out.join('\n'));
          NODE
      - name: Commit report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/sales-service-api.txt
          git commit -m 'Inspect sales posting service API'
          git push origin odoo-traceability-actions
