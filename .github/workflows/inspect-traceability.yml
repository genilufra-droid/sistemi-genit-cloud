name: Fix sales API binding

on:
  push:
    branches: [odoo-traceability-actions]
    paths:
      - '.github/workflows/inspect-traceability.yml'

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: odoo-traceability-actions
      - name: Bind demo to real sales services
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('apps/web/odoo-traceability-actions.js')
          s = p.read_text()
          old = "if (typeof S.saveSale === 'function' && typeof S.registerSale === 'function') { await S.saveSale(invoice); await S.registerSale(DEMO.saleId); }"
          new = "if (typeof S.saveSalesInvoice === 'function' && typeof S.registerSale === 'function') { await S.saveSalesInvoice(invoice); await S.registerSale(DEMO.saleId); }"
          if old not in s:
              raise SystemExit('Expected sales binding not found')
          p.write_text(s.replace(old, new, 1))
          PY
          node --check apps/web/odoo-traceability-actions.js
      - name: Commit correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/odoo-traceability-actions.js
          git commit -m 'Bind Gjethe Ferre scenario to real sales API'
          git push origin odoo-traceability-actions
