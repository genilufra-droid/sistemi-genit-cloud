name: Remove temporary traceability diagnostics

on:
  push:
    branches: [odoo-traceability-actions]
    paths:
      - '.github/workflows/inspect-traceability.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: odoo-traceability-actions
      - name: Remove temporary files
        run: |
          rm -f \
            .github/workflows/inspect-traceability.yml \
            docs/auth-startup-snippets.txt \
            docs/export-api-snippets.txt \
            docs/odoo-traceability-test-report.txt \
            docs/sales-service-api.txt \
            docs/traceability-core-range.txt \
            docs/traceability-functions.txt \
            docs/traceability-services.txt \
            docs/traceability-source-snippets.txt \
            docs/traceability-ui-range.txt
      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove temporary traceability diagnostics'
          git push origin odoo-traceability-actions
