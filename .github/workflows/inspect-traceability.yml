name: Inspect traceability source

on:
  push:
    branches: [odoo-traceability-actions]
    paths:
      - '.github/workflows/inspect-traceability.yml'

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: odoo-traceability-actions
      - name: Extract exact traceability ranges
        run: |
          node <<'NODE'
          const fs = require('fs');
          const lines = fs.readFileSync('apps/web/index.html','utf8').split(/\r?\n/);
          function writeRange(path,start,end){
            const out=[];
            for(let i=start-1;i<Math.min(end,lines.length);i++) out.push(`${i+1}: ${lines[i]}`);
            fs.writeFileSync(path,out.join('\n'));
          }
          fs.mkdirSync('docs',{recursive:true});
          writeRange('docs/traceability-core-range.txt',2907,3375);
          writeRange('docs/traceability-ui-range.txt',7418,7505);
          NODE
      - name: Commit report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/traceability-core-range.txt docs/traceability-ui-range.txt
          git commit -m 'Extract exact traceability core and UI ranges'
          git push origin odoo-traceability-actions
