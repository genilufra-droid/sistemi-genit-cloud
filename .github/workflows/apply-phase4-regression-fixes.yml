name: Apply Phase 4 regression corrections

on:
  push:
    branches: [phase4-full-traceability-operations]
    paths:
      - '.github/workflows/apply-phase4-regression-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-full-traceability-operations
          fetch-depth: 0
      - name: Extend Cloud regression and harden offline process demo
        run: |
          python3 <<'PY'
          from pathlib import Path

          cloud = Path('tests/cloud-erp-adapter-smoke.cjs')
          s = cloud.read_text()
          anchor = """    if (req.method === 'GET' && url.pathname === '/api/users') {"""
          addition = """    if (req.method === 'GET' && ['/api/trace/farms','/api/trace/parcels','/api/trace/lots','/api/weights'].includes(url.pathname)) {
      if (!authorized(req)) return json(res, 401, { error: 'AUTH_REQUIRED', message: 'Duhet të identifikoheni.' });
      return json(res, 200, []);
    }
"""
          if addition not in s:
              if anchor not in s: raise SystemExit('Cloud users route anchor missing')
              s = s.replace(anchor, addition + anchor, 1)
          cloud.write_text(s)

          odoo = Path('apps/web/odoo-traceability-actions.js')
          lines = odoo.read_text().splitlines()
          marker = 'await S.saveProcessBatch({ id: DEMO.batchId'
          fallback_marker = 'var persistedDemoBatch = await DB.get'
          if not any(fallback_marker in line for line in lines):
              index = next((i for i,line in enumerate(lines) if marker in line), None)
              if index is None: raise SystemExit('Demo process save anchor missing')
              indent = lines[index][:len(lines[index])-len(lines[index].lstrip())]
              call = lines[index].replace('await S.saveProcessBatch(', 'var demoBatch = await S.saveProcessBatch(', 1)
              replacement = [
                  call,
                  indent + "var persistedDemoBatch = await DB.get('processBatches', demoBatch.id);",
                  indent + "if (!persistedDemoBatch) {",
                  indent + "  await DB.atomicTx(['processBatches', 'processBatchInputs'], 'readwrite', function (stores) {",
                  indent + "    stores.processBatches.put(demoBatch);",
                  indent + "    (demoBatch.inputs || []).forEach(function (line) { stores.processBatchInputs.put(line); });",
                  indent + "  });",
                  indent + "  persistedDemoBatch = await DB.get('processBatches', demoBatch.id);",
                  indent + "}",
                  indent + "if (!persistedDemoBatch) throw new Error('Urdhri demonstrues i Punës nuk u ruajt në databazë.');"
              ]
              lines[index:index+1] = replacement
          result_anchor = "batch: await DB.get('processBatches', DEMO.batchId)"
          result_fix = "batch: await DB.get('processBatches', demoBatch.id)"
          text = '\n'.join(lines) + '\n'
          if result_anchor in text: text = text.replace(result_anchor, result_fix, 1)
          elif result_fix not in text: raise SystemExit('Demo process return anchor missing')
          odoo.write_text(text)
          PY
          node --check tests/cloud-erp-adapter-smoke.cjs
          node --check apps/web/odoo-traceability-actions.js
          grep -q "/api/trace/farms" tests/cloud-erp-adapter-smoke.cjs
          grep -q "persistedDemoBatch" apps/web/odoo-traceability-actions.js
      - name: Commit corrections and remove workflow
        run: |
          rm -f .github/workflows/apply-phase4-regression-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/cloud-erp-adapter-smoke.cjs apps/web/odoo-traceability-actions.js .github/workflows/apply-phase4-regression-fixes.yml
          git commit -m 'Fix Phase 4 browser regressions'
          git push origin HEAD:phase4-full-traceability-operations
