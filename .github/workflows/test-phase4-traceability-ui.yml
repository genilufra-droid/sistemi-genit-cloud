name: Test Phase 4 traceability UI

on:
  push:
    branches: [phase4-full-traceability-operations]
    paths:
      - 'apps/web/phase4-traceability-ui.*'
      - 'apps/web/package.json'
      - 'scripts/patch-phase4-traceability.cjs'
      - 'tests/phase4-traceability-ui-smoke.cjs'
      - '.github/workflows/test-phase4-traceability-ui.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Validate and build exact HTML with Phase 4
        run: |
          node --check apps/web/phase4-traceability-ui.js
          node --check scripts/patch-phase4-traceability.cjs
          node --check tests/phase4-traceability-ui-smoke.cjs
          cd apps/web
          npm ci --workspaces=false
          VITE_API_URL=http://127.0.0.1:3100 GENIT_CLOUD_REQUIRED=true npm run build
          cmp index.html dist/index.html
          grep -q 'SG_PHASE4_TRACEABILITY_UI_START' dist/index.html
          grep -q 'Posto Pranimin &amp; Krijo Lotin' dist/index.html
          grep -q 'Loti nuk krijohet manualisht' dist/index.html
          grep -q 'Gjurmueshmëri 360°' dist/index.html
      - name: Install browser runtime
        run: |
          mkdir -p /tmp/sg-phase4-browser
          cd /tmp/sg-phase4-browser
          npm init -y >/dev/null
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Verify automatic lot operator workflow
        id: ui_test
        continue-on-error: true
        run: |
          mkdir -p /tmp/phase4-ui-report
          cd apps/web
          PORT=4173 npm run start > /tmp/phase4-ui-report/web.log 2>&1 &
          web_pid=$!
          echo $web_pid > /tmp/phase4-ui-report/web.pid
          for attempt in $(seq 1 45); do
            curl --fail --silent http://127.0.0.1:4173 >/dev/null && break
            sleep 1
          done
          cd ../..
          set +e
          NODE_PATH=/tmp/sg-phase4-browser/node_modules TEST_URL=http://127.0.0.1:4173 node tests/phase4-traceability-ui-smoke.cjs > /tmp/phase4-ui-report/test.log 2>&1
          status=$?
          echo '' >> /tmp/phase4-ui-report/test.log
          echo '--- WEB SERVER LOG ---' >> /tmp/phase4-ui-report/test.log
          cat /tmp/phase4-ui-report/web.log >> /tmp/phase4-ui-report/test.log 2>&1 || true
          kill $web_pid || true
          cat /tmp/phase4-ui-report/test.log
          exit $status
      - name: Upload Phase 4 UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-traceability-ui-report
          path: /tmp/phase4-ui-report/test.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce Phase 4 UI result
        if: steps.ui_test.outcome != 'success'
        run: exit 1
