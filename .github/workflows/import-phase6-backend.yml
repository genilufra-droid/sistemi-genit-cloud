name: Import verified Phase 6 backend

on:
  push:
    branches: [phase6-cloud-final]
    paths:
      - '.github/workflows/import-phase6-backend.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase6-cloud-final
          fetch-depth: 0
      - name: Import verified Phase 6 backend
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin phase6-expenses-logistics-assets
          git checkout origin/phase6-expenses-logistics-assets -- \
            apps/api/src/phase6-operations.js \
            apps/api/src/phase6-asset-disposal.js \
            apps/api/src/phase6-logistics-report-hotfix.js \
            apps/api/src/phase5-launcher.js \
            apps/api/package.json \
            .github/workflows/test-phase6-operations.yml
          npm --prefix apps/api ci --workspaces=false
          npm --prefix apps/api run check
          git add apps/api .github/workflows/test-phase6-operations.yml
          git commit -m 'Import verified Phase 6 operations backend'
          git push origin HEAD:phase6-cloud-final
