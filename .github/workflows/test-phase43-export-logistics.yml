name: Test Phase 4.3 export logistics

on:
  push:
    branches: [phase4-export-shipments-logistics]
    paths:
      - 'apps/api/**'
      - 'tests/phase43-export-logistics.cjs'
      - '.github/workflows/test-phase43-export-logistics.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-logistics:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: genit_phase43_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genit_phase43_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/genit_phase43_test
      JWT_SECRET: phase43-export-logistics-test-secret-2026-minimum-32
      NODE_ENV: test
      CORS_ORIGIN: http://127.0.0.1:4173
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Validate API source
        run: |
          cd apps/api
          npm ci --workspaces=false
          npm run check
          node --check src/phase4-export-logistics.js
          cd ../..
          node --check tests/phase43-export-logistics.cjs
      - name: Start API
        run: |
          cd apps/api
          node src/server.js > /tmp/phase43-api.log 2>&1 &
          echo $! > /tmp/phase43-api.pid
          for attempt in $(seq 1 60); do
            curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/phase43-api.log
          exit 1
      - name: Verify shipment lifecycle and stock
        id: phase43_test
        continue-on-error: true
        run: |
          mkdir -p /tmp/phase43-report
          set +e
          TEST_API_URL=http://127.0.0.1:3000 node tests/phase43-export-logistics.cjs > /tmp/phase43-report/test.log 2>&1
          status=$?
          echo '' >> /tmp/phase43-report/test.log
          echo '--- API SERVER LOG ---' >> /tmp/phase43-report/test.log
          cat /tmp/phase43-api.log >> /tmp/phase43-report/test.log 2>&1 || true
          cat /tmp/phase43-report/test.log
          exit $status
      - name: Upload Phase 4.3 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase43-export-logistics-report
          path: /tmp/phase43-report/test.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce Phase 4.3 result
        if: steps.phase43_test.outcome != 'success'
        run: exit 1
      - name: Stop API
        if: always()
        run: |
          test -f /tmp/phase43-api.pid && kill $(cat /tmp/phase43-api.pid) || true
