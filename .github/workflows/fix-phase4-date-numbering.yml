name: Fix Phase 4 date numbering

on:
  push:
    branches: [phase4-full-traceability-operations]
    paths:
      - '.github/workflows/fix-phase4-date-numbering.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-full-traceability-operations
          fetch-depth: 0
      - name: Normalize PostgreSQL DATE values
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('apps/api/src/phase4-traceability.js')
          s=p.read_text()
          old="""  const day = String(sourceDate || new Date().toISOString().slice(0, 10)).replace(/-/g, '');"""
          new="""  const dateText = sourceDate instanceof Date ? sourceDate.toISOString().slice(0, 10) : String(sourceDate || new Date().toISOString().slice(0, 10)).slice(0, 10);\n  const day = dateText.replace(/-/g, '');"""
          if old in s: s=s.replace(old,new,1)
          elif new not in s: raise SystemExit('Lot date anchor missing')
          old2="""  const year = String(documentDate || new Date().toISOString().slice(0, 10)).slice(0, 4);"""
          new2="""  const dateText = documentDate instanceof Date ? documentDate.toISOString().slice(0, 10) : String(documentDate || new Date().toISOString().slice(0, 10)).slice(0, 10);\n  const year = dateText.slice(0, 4);"""
          if old2 in s: s=s.replace(old2,new2,1)
          elif new2 not in s: raise SystemExit('Receipt date anchor missing')
          p.write_text(s)
          PY
          node --check apps/api/src/phase4-traceability.js
          grep -q 'sourceDate instanceof Date' apps/api/src/phase4-traceability.js
          grep -q 'documentDate instanceof Date' apps/api/src/phase4-traceability.js
      - name: Commit correction and remove workflow
        run: |
          rm -f .github/workflows/fix-phase4-date-numbering.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/phase4-traceability.js .github/workflows/fix-phase4-date-numbering.yml
          git commit -m 'Normalize PostgreSQL dates in automatic numbering'
          git push origin HEAD:phase4-full-traceability-operations
