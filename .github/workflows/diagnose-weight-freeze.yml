name: Diagnose weight freeze

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/diagnose-weight-freeze.mjs'
      - '.github/workflows/diagnose-weight-freeze.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install chromium
      - name: Reproduce production freeze
        env:
          TARGET_URL: https://genit-web-production.up.railway.app/?diagnostic=weight-freeze-v66
        run: node scripts/diagnose-weight-freeze.mjs
