name: Apply Registry Edit UI

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/src/RegistryPages.jsx'
      - 'apps/web/src/registry.css'
      - 'scripts/apply-registry-ui.mjs'
      - '.github/workflows/apply-registry-ui.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply integration
        run: node scripts/apply-registry-ui.mjs
      - name: Install dependencies
        run: npm ci
      - name: Validate API and web build
        run: npm run check
      - name: Commit integration
        run: |
          if git diff --quiet; then
            echo "No integration changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/Phase2Pages.jsx
          git commit -m "Enable edit actions for products clients and suppliers"
          git push origin main
