name: Validate Phase 2

on:
  push:
    branches:
      - phase-2-core

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-2-core
          fetch-depth: 0
      - name: Apply frontend fixes
        run: node scripts/fix-phase2.mjs
      - name: Install dependencies
        run: npm install
      - name: Run complete checks
        run: npm run check
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            echo "No fixes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/Phase2Pages.jsx
          git commit -m "Fix Phase 2 frontend handlers"
          git push origin phase-2-core
