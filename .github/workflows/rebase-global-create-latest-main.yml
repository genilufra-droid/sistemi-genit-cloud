name: Rebase global create onto latest main

on:
  push:
    branches: [phase42-global-create-latest-main]
    paths:
      - '.github/workflows/rebase-global-create-latest-main.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebase-feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase42-global-create-latest-main
          fetch-depth: 0
      - name: Import only isolated feature files
        run: |
          git fetch origin phase42-global-search-create-phase5
          git checkout origin/phase42-global-search-create-phase5 -- \
            apps/api/src/global-master-data.js \
            apps/web/global-create-cta.js \
            apps/web/global-create-cta.css \
            scripts/patch-global-create-cta.cjs \
            scripts/patch-global-master-data-server.py \
            scripts/patch-global-create-browser-tests.py \
            tests/global-quick-create-dom.mjs \
            tests/phase42-global-master-flow.mjs
      - name: Patch latest server and browser tests
        run: |
          python3 scripts/patch-global-master-data-server.py
          python3 scripts/patch-global-create-browser-tests.py
          python3 - <<'PY'
          import json
          from pathlib import Path
          path=Path('apps/api/package.json')
          data=json.loads(path.read_text())
          check=data.get('scripts',{}).get('check','')
          marker='node --check src/global-master-data.js'
          if marker not in check:
              data['scripts']['check']=check.rstrip()+' && '+marker
          path.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n')
          PY
          node --check apps/api/src/server.js
          node --check apps/api/src/global-master-data.js
          node --check apps/web/global-create-cta.js
          node --check scripts/patch-global-create-cta.cjs
          node --check tests/cloud-erp-adapter-smoke.cjs
          node --check tests/phase4-traceability-ui-smoke.cjs
          node --check tests/phase42-processing-ui-smoke.cjs
          node --check tests/phase43-export-ui-smoke.cjs
      - name: Remove temporary workflow and commit
        run: |
          git rm .github/workflows/rebase-global-create-latest-main.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api apps/web/global-create-cta.js apps/web/global-create-cta.css scripts tests
          git commit -m 'Rebase global PostgreSQL search-create onto latest main'
          git push origin HEAD:phase42-global-create-latest-main
