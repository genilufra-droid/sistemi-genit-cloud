name: Apply Phase 5 lazy finance refresh

on:
  push:
    branches: [phase4-export-final-verified]
    paths:
      - 'scripts/patch-phase5-lazy-finance-refresh.py'
      - '.github/workflows/apply-phase5-lazy-refresh.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-export-final-verified
          fetch-depth: 0
      - name: Apply and validate focused UI fix
        run: |
          python3 scripts/patch-phase5-lazy-finance-refresh.py
          node --check apps/web/phase5-finance-ui.js
      - name: Commit verified source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/phase5-finance-ui.js
          if git diff --cached --quiet; then
            echo 'No source change required.'
          else
            git commit -m 'Scope finance refresh to finance views'
            git push origin HEAD:phase4-export-final-verified
          fi
