name: Activate exact HTML 6.4

on:
  push:
    branches: [html-6-4-online]
    paths:
      - 'html64-source/**'
      - '.github/workflows/activate-html64.yml'

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: html-6-4-online
          fetch-depth: 0

      - name: Rebuild exact uploaded HTML
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/web
          cat html64-source/xz-*.b64 | tr -d '\r\n ' | base64 -d > /tmp/sistemi-genit-html64.xz
          xz -t /tmp/sistemi-genit-html64.xz
          xz -dc /tmp/sistemi-genit-html64.xz > apps/web/index.html
          test "$(wc -c < apps/web/index.html)" -gt 1000000
          grep -qi '<!DOCTYPE html' apps/web/index.html
          grep -qi 'Sistemi Genit' apps/web/index.html
          grep -qi 'Fatura Blerjeje' apps/web/index.html
          grep -qi 'Mandat Arkëtimi' apps/web/index.html
          grep -qi 'Raporte Shitje' apps/web/index.html

      - name: Configure exact static HTML build
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'apps/web/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.scripts = {
            ...(pkg.scripts || {}),
            build: 'rm -rf dist && mkdir -p dist && cp index.html dist/index.html',
            start: 'vite preview --host 0.0.0.0 --port ${PORT:-4173}',
            dev: 'vite --host 0.0.0.0'
          };
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Validate static build
        run: |
          npm run build --workspace apps/web
          cmp apps/web/index.html apps/web/dist/index.html
          test "$(wc -c < apps/web/dist/index.html)" -gt 1000000

      - name: Commit exact HTML frontend
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/index.html apps/web/package.json
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m 'Activate exact Sistemi Genit HTML 6.4 frontend'
          git push origin html-6-4-online
