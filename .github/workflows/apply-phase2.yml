name: Apply Phase 2 Integration

on:
  push:
    branches:
      - phase-2-core

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase-2-core
          fetch-depth: 0

      - name: Apply integration patch
        run: node scripts/apply-phase2.mjs

      - name: Validate API syntax
        run: |
          node --check apps/api/src/server.js
          node --check apps/api/src/phase2.js
          node --check apps/api/src/phase2-documents.js
          node --check apps/api/src/run-phase2-migration.js

      - name: Commit integrated files
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/server.js apps/api/src/run-phase2-migration.js apps/web/src/App.jsx
          git commit -m "Integrate Phase 2 API and web navigation"
          git push origin phase-2-core
