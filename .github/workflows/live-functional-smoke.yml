name: Test every live HTML module

on:
  push:
    branches: [exact-html-online]
    paths:
      - '.github/workflows/live-functional-smoke.yml'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exact-html-online
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser test runtime
        run: |
          mkdir -p /tmp/sg-browser-test
          cd /tmp/sg-browser-test
          npm init -y >/dev/null
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Test first setup and every module
        id: smoke
        continue-on-error: true
        working-directory: /tmp/sg-browser-test
        run: |
          cat > smoke.cjs <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright');
          const reportPath = process.env.GITHUB_WORKSPACE + '/docs/live-functional-report.txt';
          const report = [];
          const add = value => { report.push(String(value)); console.log(value); };

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({ viewport: { width: 1600, height: 1000 } });
            const page = await context.newPage();
            const pageErrors = [];
            page.on('pageerror', error => pageErrors.push(`pageerror: ${error.message}`));
            page.on('console', message => {
              if (message.type() === 'error') pageErrors.push(`console: ${message.text()}`);
            });

            await page.goto('https://genit-web-production.up.railway.app/?v=html64-browser-diagnostic', {
              waitUntil: 'domcontentloaded', timeout: 60000,
            });
            await page.waitForFunction(() => document.querySelector('#first-admin-form') || document.querySelector('#login-form') || document.querySelector('#app-shell'), null, { timeout: 30000 });
            add(`initial=${await page.locator('#first-admin-form').count() ? 'first-admin' : await page.locator('#login-form').count() ? 'login' : 'app'}`);

            if (await page.locator('#first-admin-form').count()) {
              await page.fill('#setup-display-name', 'Kontroll Automatik');
              await page.fill('#setup-username', 'kontroll');
              await page.fill('#setup-password', 'Kontroll123');
              await page.fill('#setup-password-confirm', 'Kontroll123');
              await page.click('#first-admin-form button[type="submit"]');
            }

            await page.waitForSelector('#app-shell', { state: 'visible', timeout: 30000 });
            const views = await page.locator('.nav-item[data-view]').evaluateAll(nodes => nodes.map(node => node.dataset.view));
            add(`module_count=${views.length}`);
            const failures = [];
            for (const view of views) {
              try {
                await page.locator(`.nav-item[data-view="${view}"]`).evaluate(node => node.click());
                await page.waitForTimeout(120);
                const state = await page.evaluate(() => ({
                  title: document.querySelector('#page-title')?.textContent?.trim() || '',
                  contentLength: (document.querySelector('#content')?.innerText || '').trim().length,
                }));
                add(`${view}|${state.title}|${state.contentLength}`);
                if (!state.title) failures.push(`${view}: mungon titulli`);
                if (!state.contentLength) failures.push(`${view}: përmbajtja është bosh`);
              } catch (error) {
                failures.push(`${view}: ${error.message}`);
              }
            }

            const capabilities = await page.evaluate(() => ({
              indexedDb: Boolean(window.indexedDB),
              xlsx: Boolean(window.XLSX),
              app: Boolean(window.App),
              auth: Boolean(window.Auth),
              print: typeof window.print === 'function',
              pdfText: document.documentElement.innerText.includes('PDF'),
              excelText: document.documentElement.innerText.includes('Excel'),
              printText: document.documentElement.innerText.includes('Print'),
            }));
            add(`capabilities=${JSON.stringify(capabilities)}`);
            for (const [key, value] of Object.entries(capabilities)) if (!value) failures.push(`kapaciteti ${key} mungon`);
            if (pageErrors.length) failures.push(...pageErrors);
            add(`failures=${failures.length}`);
            failures.forEach(value => add(`FAIL: ${value}`));
            add(failures.length ? 'TEST_FAILED' : 'TEST_SUCCESS');
            fs.mkdirSync(require('path').dirname(reportPath), { recursive: true });
            fs.writeFileSync(reportPath, report.join('\n') + '\n');
            await browser.close();
            if (failures.length) process.exit(1);
          })().catch(error => {
            add(`FATAL: ${error.stack || error.message || error}`);
            add('TEST_FAILED');
            fs.mkdirSync(require('path').dirname(reportPath), { recursive: true });
            fs.writeFileSync(reportPath, report.join('\n') + '\n');
            process.exit(1);
          });
          NODE
          node smoke.cjs
      - name: Save browser report
        if: always() && github.event_name == 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/live-functional-report.txt
          git commit -m 'Record live functional browser test report'
          git push origin exact-html-online
      - name: Enforce browser result
        if: steps.smoke.outcome != 'success'
        run: exit 1
