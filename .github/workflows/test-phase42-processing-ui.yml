name: Test Phase 4.2 operator UI

on:
  push:
    branches: [phase4-processing-packaging]
    paths:
      - 'apps/web/phase4-processing-packaging-ui.*'
      - 'apps/web/global-create-cta.*'
      - 'apps/web/cloud-erp-adapter.js'
      - 'apps/web/package.json'
      - 'scripts/patch-phase4-processing-ui.cjs'
      - 'scripts/patch-global-create-cta.cjs'
      - 'scripts/patch-cloud-context-stability.cjs'
      - 'scripts/patch-quick-create-cloud.cjs'
      - 'tests/phase42-processing-ui-smoke.cjs'
      - '.github/workflows/test-phase42-processing-ui.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Validate and build Phase 4.2 UI
        run: |
          node --check apps/web/phase4-processing-packaging-ui.js
          node --check apps/web/global-create-cta.js
          node --check tests/phase42-processing-ui-smoke.cjs
          node --check scripts/patch-phase4-processing-ui.cjs
          node --check scripts/patch-global-create-cta.cjs
          node --check scripts/patch-cloud-context-stability.cjs
          node --check scripts/patch-quick-create-cloud.cjs
          cd apps/web
          npm ci --workspaces=false
          VITE_API_URL=http://127.0.0.1:3100 GENIT_CLOUD_REQUIRED=true npm run build
          grep -q 'SG_PHASE42_PROCESSING_UI_START' dist/index.html
          grep -q 'Proces & Paketim Cloud' dist/index.html
          grep -q 'completeQuickCreate' dist/index.html
          grep -q '+ Shto' dist/index.html
      - name: Install browser runtime
        run: |
          mkdir -p /tmp/sg-phase42-ui
          cd /tmp/sg-phase42-ui
          npm init -y >/dev/null
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Verify operator and quick-create workflow
        id: ui_test
        continue-on-error: true
        run: |
          mkdir -p /tmp/sg-phase42-ui-report
          cd apps/web
          npm run start > /tmp/sg-phase42-web.log 2>&1 &
          server_pid=$!
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4173 >/dev/null && break
            sleep 1
          done
          cd ../..
          set +e
          NODE_PATH=/tmp/sg-phase42-ui/node_modules TEST_URL=http://127.0.0.1:4173 node tests/phase42-processing-ui-smoke.cjs > /tmp/sg-phase42-ui-report/browser.txt 2>&1
          status=$?
          echo '' >> /tmp/sg-phase42-ui-report/browser.txt
          echo '--- WEB SERVER LOG ---' >> /tmp/sg-phase42-ui-report/browser.txt
          cat /tmp/sg-phase42-web.log >> /tmp/sg-phase42-ui-report/browser.txt 2>&1 || true
          kill $server_pid || true
          cat /tmp/sg-phase42-ui-report/browser.txt
          exit $status
      - name: Upload Phase 4.2 UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase42-processing-ui-report
          path: /tmp/sg-phase42-ui-report/browser.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce Phase 4.2 UI result
        if: steps.ui_test.outcome != 'success'
        run: exit 1
