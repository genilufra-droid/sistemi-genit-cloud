name: Apply Phase 4.3 test correction

on:
  push:
    branches: [phase4-export-shipments-logistics]
    paths:
      - 'scripts/patch-phase43-test-expectation.cjs'
      - '.github/workflows/apply-phase43-test-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4-export-shipments-logistics
          fetch-depth: 0
      - name: Apply and validate test correction
        run: |
          node scripts/patch-phase43-test-expectation.cjs
          node --check tests/phase43-export-logistics.cjs
      - name: Commit corrected test
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/phase43-export-logistics.cjs
          git commit -m 'Align Phase 4.3 report expectation'
          git push origin HEAD:phase4-export-shipments-logistics
