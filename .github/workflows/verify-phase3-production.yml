name: Verify Phase 3 production deployment

on:
  push:
    branches: [verify-phase3-production]
    paths:
      - '.github/workflows/verify-phase3-production.yml'
      - 'scripts/verify-phase3-production.mjs'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-phase3-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      WEB_URL: https://genit-web-production.up.railway.app/
      EXPECTED_COMMIT: 14165789188bf58ea479acba89ab37c2a63c61a5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'verify-phase3-production' }}

      - name: Verify live Railway deployment
        id: production
        continue-on-error: true
        run: node scripts/verify-phase3-production.mjs

      - name: Upload production report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-production-verification
          path: /tmp/phase3-production
          if-no-files-found: error
          retention-days: 7

      - name: Enforce production result
        if: steps.production.outcome != 'success'
        run: exit 1
